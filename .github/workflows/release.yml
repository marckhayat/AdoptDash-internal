name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Zip app files
        run: |
          zip -r AdoptDash-${{ github.ref_name }}.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.pptx"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: AdoptDash-${{ github.ref_name }}.zip
          generate_release_notes: true
